remote_theme: mmistakes/so-simple-theme

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

# 3. Site settings
locale: en-GB
title: "syllagent"
description: "Writing, research, and reflections on teaching agents, LLMs, and everything AI."
url: "https://syllagent.com"
baseurl: ""
email: "daniel@syllagent.com"
# logo: "/images/site-logo.png"

date_format: "%B %-d, %Y"
read_time: true
words_per_minute: 200

google_fonts:
  - name: "Space Grotesk"
    weights: "400,400i,500,600,700"

# Search
skin: "/assets/css/skins/custom.css"

search_full_content: false

# Taxonomy pages
category_archive_path: "/categories/#"
tag_archive_path: "/tags/#"

# 4. Jekyll settings
paginate: 5
paginate_path: /page:num/
markdown: kramdown
permalink: /posts/:title/
timezone: Europe/London

# 5. Collections
collections:
  posts:
    output: true
    permalink: /posts/:title/

# 6. Defaults
defaults:
  - scope:
      path: ""
    values:
      image: /assets/default-social.png
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      comments: false
      share: true
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# 7. Author
author:
  name: Daniel
  picture: "/images/author.jpg"
  links:
    - title: RSS
      url: /feed.xml
      icon: fas fa-rss-square

# 8. Footer
footer_links:
  - title: Feed
    url: /feed.xml
    icon: fas fa-rss-square

# 9. Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .git
  - .gitignore
  - node_modules
  - styles/
  - AGENTS.md
